  <body>
    <header>
      <div class="logo">
        <i class="fa-solid fa-car"></i>
        <a href="./index.html">Car Rental</a>
      </div>
      <div class="menu">
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./vehicles.html">Vehicles</a></li>
          <li><a href="#">Details</a></li>
          <li><a href="#">About Us</a></li>

        </ul>
      </div>
      <div class="tel">
        <i class="fa-solid fa-phone"></i>
        <a href="#">Need help? <br />+998991234567</a>
      </div>
    </header>

    <!-- Tech specification -->
    <div class="tech-about">
      <div class="tech">
        <div class="top">
          <h2>BMW</h2>
          <p><b>$25</b>/day</p>
        </div>
        <img src="./assets/img/car.jpg" alt="Error" />
        <div class="bottom">
          <img src="./assets/img/car.jpg" alt="Error" />
          <img src="./assets/img/car.jpg" alt="Error" />
          <img src="./assets/img/car.jpg" alt="Error" />
        </div>
      </div>

      <!-- about -->
      <div class="about">
        <h3>Technical Specification</h3>
        <div class="car-features">
          <div class="car-f">
            <i class="fa-brands fa-whmcs"></i>
            <ul>
              <li><b>Gear Box</b></li>
              <li><span>Automat</span></li>
            </ul>
          </div>
          <div class="car-f">
            <i class="fa-solid fa-gas-pump"></i>
            <ul>
              <li><b>Fuel</b></li>
              <li><span>Petrol</span></li>
            </ul>
          </div>
          <div class="car-f">
            <i class="fa-solid fa-door-closed"></i>
            <ul>
              <li><b>Doors</b></li>
              <li><span>2</span></li>
            </ul>
          </div>
          <div class="car-f">
            <i class="fa-solid fa-wind"></i>
            <ul>
              <li><b>Air Conditioner</b></li>
              <li><span>Yes</span></li>
            </ul>
          </div>
          <div class="car-f">
            <i class="fa-solid fa-chair"></i>
            <ul>
              <li><b>Seats</b></li>
              <li><span>5</span></li>
            </ul>
          </div>
          <div class="car-f">
            <i class="fa-solid fa-road"></i>
            <ul>
              <li><b>Distance</b></li>
              <li><span>500</span></li>
            </ul>
          </div>
        </div>


      </div>


      
    </div>
